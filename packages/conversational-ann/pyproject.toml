[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "conversational-ann"
version = "0.0.1"
description = "ANN retrieval evaluation of turn representations for conversational memory in TOD."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Juan Manuel Fernandez" }]
keywords = ["dialogue", "retrieval", "ann", "faiss", "conversational-memory", "tod"]

dependencies = [
    "numpy",
    "pandas",
]

# Nota: el paquete hermano `contextual-turn-embeddings` se instala por separado
# (es un paquete local del monorepo): pip install -e packages/contextual-turn-embeddings

[project.optional-dependencies]
# Backends de búsqueda y estadística (se habilitan a medida que llega el código).
ann = ["faiss-cpu"]
stats = ["scipy"]
dev = ["pytest"]

[tool.setuptools.packages.find]
include = ["conversational_ann*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
